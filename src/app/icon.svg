<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Dark background -->
  <rect width="40" height="40" rx="9" fill="#060609"/>

  <!-- Outer hexagon -->
  <polygon
    points="20,3 35.5,11.75 35.5,28.25 20,37 4.5,28.25 4.5,11.75"
    stroke="#34d399" stroke-width="1.4" stroke-opacity="0.8" fill="none"/>

  <!-- Inner hexagon -->
  <polygon
    points="20,10 28,14.6 28,25.4 20,30 12,25.4 12,14.6"
    stroke="#34d399" stroke-width="0.75" stroke-opacity="0.25" fill="none"/>

  <!-- Outer triangle nodes -->
  <circle cx="20" cy="3" r="2.2" fill="#34d399"/>
  <circle cx="35.5" cy="28.25" r="2.2" fill="#34d399"/>
  <circle cx="4.5" cy="28.25" r="2.2" fill="#34d399"/>

  <!-- Connecting edges -->
  <line x1="20" y1="3" x2="35.5" y2="28.25" stroke="#34d399" stroke-width="0.9" stroke-opacity="0.3"/>
  <line x1="20" y1="3" x2="4.5" y2="28.25"  stroke="#34d399" stroke-width="0.9" stroke-opacity="0.3"/>
  <line x1="35.5" y1="28.25" x2="4.5" y2="28.25" stroke="#34d399" stroke-width="0.9" stroke-opacity="0.3"/>

  <!-- Center glow -->
  <circle cx="20" cy="18" r="4" fill="#34d399" fill-opacity="0.12"/>
  <circle cx="20" cy="18" r="2" fill="#34d399"/>

  <!-- Spokes -->
  <line x1="20" y1="18" x2="20"   y2="3"    stroke="#34d399" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <line x1="20" y1="18" x2="35.5" y2="28.25" stroke="#34d399" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <line x1="20" y1="18" x2="4.5"  y2="28.25" stroke="#34d399" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="2 2"/>
</svg>
